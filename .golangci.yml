# golangci-lint configuration (v2.x)
# https://golangci-lint.run/docs/configuration/
version: "2"

run:
  tests: true

# Formatters (moved from linters in v2)
formatters:
  enable:
  - gofmt
  - goimports

linters:
  default: none
  enable:
  # Default linters
  - errcheck
  - govet
  - ineffassign
  - staticcheck # includes gosimple + stylecheck in v2
  - unused

  # Additional recommended linters
  - bodyclose
  - contextcheck
  - dupl
  - durationcheck
  - errname
  - errorlint
  - exhaustive
  - copyloopvar
  - forbidigo
  - gocognit
  - goconst
  - gocritic
  - gocyclo
  - gosec
  - misspell
  - nakedret
  - nilerr
  - nilnil
  - noctx
  - nolintlint
  - prealloc
  - predeclared
  - revive
  - sqlclosecheck

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
      - (io.Closer).Close
      - (net/http.ResponseWriter).Write

    govet:
      enable-all: true
      disable:
      - fieldalignment

    gocyclo:
      min-complexity: 15

    gocognit:
      min-complexity: 20

    dupl:
      threshold: 100

    goconst:
      min-len: 3
      min-occurrences: 3

    gocritic:
      enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
      disabled-checks:
      - hugeParam
      - rangeValCopy

    gosec:
      excludes:
      - G104
      - G304

    misspell:
      locale: US

    nakedret:
      max-func-lines: 30

    prealloc:
      simple: true
      range-loops: true
      for-loops: true

    revive:
      rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      # - name: exported
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unreachable-code

    staticcheck:
      checks: [ "all", "-ST1000", "-ST1003", "-ST1016" ]
      dot-import-whitelist:
      - github.com/onsi/ginkgo/v2
      - github.com/onsi/gomega

  exclusions:
    generated: lax
    rules:
    - path: _test\.go
      linters:
      - dupl
      - gocyclo
      - gocognit
      - gosec
      - errcheck
      - goconst

    - path: db/sqlc/
      linters:
      - dupl
      - gocritic
      - staticcheck
      - revive

    - linters:
      - lll
      source: "^//go:"

issues:
  max-issues-per-linter: 50
  max-same-issues: 10

severity:
  default: warning
  rules:
  - linters:
    - gosec
    severity: error
  - linters:
    - errcheck
    severity: error
