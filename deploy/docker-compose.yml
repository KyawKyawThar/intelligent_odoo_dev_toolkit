name: odoodevtools

services:
  postgres:
    image: postgres:18-alpine
    networks: [backend]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    env_file:
      - ../.env
    volumes:
      - ./db-data/postgres_data:/var/lib/postgresql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  redis:
    image: redis:8.6-alpine
    restart: unless-stopped
    networks: [backend]
    command:
      - redis-server
      - --requirepass
      - "${REDIS_PASSWORD}"
      - --appendonly
      - "yes"
      - --maxmemory
      - "${REDIS_MAXMEMORY:-256mb}"
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Odoo (local dev, odoo-dev profile) ──────
  odoo-db:
    image: postgres:18-alpine
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${PG_ODOO_USER}
      POSTGRES_PASSWORD: ${PG_ODOO_PASSWORD}
      POSTGRES_DB: ${PG_ODOO_DB}
    volumes:
      - odoo_db_data:/var/lib/postgresql/data
    networks: [backend]
    profiles: [odoo-dev]
    ports:
      - "${PG_ODOO_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_ODOO_USER} -d ${PG_ODOO_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  odoo:
    image: odoo:17
    depends_on:
      odoo-db:
        condition: service_healthy # wait until Postgres is actually ready
    ports:
      - "8069:8069"
    volumes:
      - ./custom-addons:/mnt/extra-addons
      - ../odoo-server.log:/var/log/odoo/odoo-server.log  # bind-mount so agent can tail it
    env_file:
      - ../.env
    environment:
      HOST: ${PG_HOST}
      USER: ${PG_ODOO_USER}
      PASSWORD: ${PG_ODOO_PASSWORD}
    command:
      [
        "-d",
        "${PG_ODOO_DB}",
        "-i",
        "base",
        "--logfile",
        "/var/log/odoo/odoo-server.log",
        # info keeps useful messages; change to warn to cut even further
        # dev: info  |  production: warning  (set via LOG_LEVEL env var, default info)
        "--log-level",
        "${ODOO_LOG_LEVEL:-info}",
        # suppress noisy low-signal handlers regardless of global level
        "--log-handler",
        "werkzeug:WARNING",
        "--log-handler",
        "PIL:WARNING",
        "--log-handler",
        "odoo.service.server:WARNING",
        "--log-handler",
        "odoo.sql_db:WARNING",
        "--db_host",
        "${PG_HOST}",
        "--addons-path",
        "/mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons",
      ]
    # Docker stdout/stderr buffer — separate from the bind-mounted log file.
    # logrotate handles the bind-mounted file (deploy/logrotate/odoo).
    logging:
      driver: "json-file"
      options:
        max-size: "50m"   # rotate each json log file at 50 MB
        max-file: "3"     # keep 3 files max = 150 MB ceiling for Docker's own buffer
    networks: [backend]
    profiles: [odoo-dev]

  mailhog:
    image: mailhog/mailhog:latest
    platform: linux/amd64
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: always
    networks: [backend]

  # # ── MinIO (S3-compatible, local dev) ────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    networks: [backend]
    env_file:
      - ../.env
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Create default S3 bucket on startup
  minio-init:
    image: minio/mc:latest
    networks: [backend]
    env_file:
      - ../.env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set myminio http://minio:9000 $${S3_ACCESS_KEY} $${S3_SECRET_KEY};
        mc mb --ignore-existing myminio/$${S3_BUCKET};
        mc anonymous set none myminio/$${S3_BUCKET};
        echo 'MinIO bucket ready.';
      "
    restart: "no"

