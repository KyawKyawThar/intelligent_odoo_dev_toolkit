# fly.toml — API server configuration
# See https://fly.io/docs/reference/configuration/

app = 'odoodevtools-api'
primary_region = 'sin'

[build]
  dockerfile = 'deploy/Dockerfile'

[env]
  APP_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
