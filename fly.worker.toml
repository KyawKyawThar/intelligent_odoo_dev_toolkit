app = 'odoodevtools-worker'
primary_region = 'sin'

[build]
  dockerfile = 'deploy/Dockerfile_worker'

[env]
  APP_ENV = 'production'

# No [http_service] — worker has no HTTP port.
# restart policy = always keeps it running if the process exits or crashes.
[[restart]]
  policy = 'always'

[[vm]]
  cpu_kind  = 'shared'
  cpus      = 1
  memory_mb = 256
