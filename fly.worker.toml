app = 'odoodevtools-worker'
primary_region = 'sin'

[build]
  dockerfile = 'deploy/Dockerfile_worker'

[env]
  APP_ENV = 'production'

# No [http_service] — worker has no HTTP port.
# Disable auto-stop: worker must run continuously to consume Redis streams.
[machines]
  auto_stop_machines  = "off"
  auto_start_machines = true

[[restart]]
  policy = 'always'

[[vm]]
  cpu_kind  = 'shared'
  cpus      = 1
  memory_mb = 256
