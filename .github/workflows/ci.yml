name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    tags:
    - "v*"
  pull_request:
    branches: [ main ]

env:
  GO_VERSION: "1.26.1"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Lint & Static Analysis
  # ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Vet
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v7
      with:
        version: v2.11.1
        args: --timeout 5m

    - name: Run go vet
      run: go vet ./...

  # ─────────────────────────────────────────────────────────────────
  # Unit Tests (no external dependencies)
  # ─────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: odoodevtools_test
        ports:
        - 5432:5432
        options: >-
          --health-cmd="pg_isready -U testuser -d odoodevtools_test" --health-interval=10s --health-timeout=5s --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
        - 6379:6379
        options: >-
          --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Download dependencies
      run: go mod download

    - name: Create test config
      run: |
        cat > .env << EOF
        DATABASE_URL=postgres://testuser:testpassword@localhost:5432/odoodevtools_test?sslmode=disable
        REDIS_HOST=localhost
        REDIS_PORT=6379
        REDIS_PASSWORD=
        SERVER_PORT=8080
        JWT_SECRET=test-secret-key-for-ci-testing-only
        JWT_ACCESS_TOKEN_TTL=15m
        JWT_REFRESH_TOKEN_TTL=24h
        APP_ENV=test
        EOF

    - name: Run unit tests
      run: |
        go test -v -race -short -coverprofile=coverage-unit.out ./...
      env:
        CGO_ENABLED: 1

    - name: Upload unit test coverage
      uses: actions/upload-artifact@v4
      with:
        name: coverage-unit
        path: coverage-unit.out

  # ─────────────────────────────────────────────────────────────────
  # Integration Tests (with PostgreSQL & Redis)
  # ─────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: odoodevtools_test
        ports:
        - 5432:5432
        options: >-
          --health-cmd="pg_isready -U testuser -d odoodevtools_test" --health-interval=10s --health-timeout=5s --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
        - 6379:6379
        options: >-
          --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Install golang-migrate
      run: |
        curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.0/migrate.linux-amd64.tar.gz | tar xvz
        sudo mv migrate /usr/local/bin/migrate

    - name: Run database migrations
      run: |
        migrate -path db/migrations -database "postgres://testuser:testpassword@localhost:5432/odoodevtools_test?sslmode=disable" up
      continue-on-error: true

    - name: Download dependencies
      run: go mod download

    - name: Create test config
      # FIX: all keys updated to match .env variable names exactly
      run: |
        cat > .env << EOF
        DATABASE_URL=postgres://testuser:testpassword@localhost:5432/odoodevtools_test?sslmode=disable
        REDIS_HOST=localhost
        REDIS_PORT=6379
        REDIS_PASSWORD=
        SERVER_PORT=8080
        JWT_SECRET=test-secret-key-for-ci-testing-only
        JWT_ACCESS_TOKEN_TTL=15m
        JWT_REFRESH_TOKEN_TTL=24h
        APP_ENV=test
        EOF
        # DB_SOURCE          → DATABASE_URL         (.env:32)
        # REDIS_ADDRESS      → REDIS_HOST + REDIS_PORT (.env:42-43)
        # SERVER_ADDRESS     → SERVER_PORT           (.env:9)
        # TOKEN_DURATION     → JWT_ACCESS_TOKEN_TTL  (.env:102)
        # REFRESH_TOKEN_DURATION → JWT_REFRESH_TOKEN_TTL (.env:103)
        # ENVIRONMENT        → APP_ENV               (.env:2)

    - name: Run integration tests
      run: |
        go test -v -race -coverprofile=coverage-integration.out ./...
      env:
        CGO_ENABLED: 1
        DATABASE_URL: postgres://testuser:testpassword@localhost:5432/odoodevtools_test?sslmode=disable
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        REDIS_PASSWORD: ""
        JWT_SECRET: test-secret-key-for-ci-testing-only
    #     - name: Upload integration test coverage
    #       uses: actions/upload-artifact@v4
    #       with:
    #         name: coverage-integration
    #         path: coverage-integration.out

    # ─────────────────────────────────────────────────────────────────
    # Security Scanning
    # ─────────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Run Gosec Security Scanner
      uses: securego/gosec@master
      with:
        args: '-no-fail -fmt sarif -out results.sarif ./...'

    - name: Upload SARIF file
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: results.sarif
      if: always()

    - name: Run govulncheck
      run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...
      continue-on-error: true # stdlib vulns — revisit when Go patches are released

  # ─────────────────────────────────────────────────────────────────
  # Build Binaries
  # ─────────────────────────────────────────────────────────────────
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: [ lint, unit-tests ]
    strategy:
      matrix:
        goos: [ linux, darwin ]
        goarch: [ amd64, arm64 ]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Build server binary
      run: |
        CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
        go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
        -o bin/server-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/server

    # Uncomment when worker & agent cmds are ready:
    # - name: Build worker binary
    #   run: |
    #     CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
    #     go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
    #     -o bin/worker-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/worker
    #   continue-on-error: true

    # - name: Build agent binary
    #   run: |
    #     CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
    #     go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
    #     -o bin/agent-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/agent
    #   continue-on-error: true

    - name: Upload binaries
      uses: actions/upload-artifact@v4
      with:
        name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
        path: bin/

  # ─────────────────────────────────────────────────────────────────
  # Build & Push Docker Images
  # ─────────────────────────────────────────────────────────────────
  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [ lint, unit-tests, integration-tests ]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (tags, labels)
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix=sha-

    - name: Build and push Server image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./deploy/Dockerfile
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          VERSION=${{ github.ref_name }}
    # Uncomment when Dockerfile_worker is ready:
    # - name: Build and push Worker image
    #   uses: docker/build-push-action@v6
    #   with:
    #     context: .
    #     file: ./deploy/Dockerfile.worker
    #     push: true
    #     platforms: linux/amd64,linux/arm64
    #     tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker:${{ github.ref_name }}
    #     labels: ${{ steps.meta.outputs.labels }}
    #     cache-from: type=gha
    #     cache-to: type=gha,mode=max
    #   continue-on-error: true

    # Uncomment when Dockerfile_agent is ready:
    # - name: Build and push Agent image
    #   uses: docker/build-push-action@v6
    #   with:
    #     context: .
    #     file: ./deploy/Dockerfile.agent
    #     push: true
    #     platforms: linux/amd64,linux/arm64
    #     tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-agent:${{ github.ref_name }}
    #     labels: ${{ steps.meta.outputs.labels }}
    #     cache-from: type=gha
    #     cache-to: type=gha,mode=max
    #   continue-on-error: true

    # ─────────────────────────────────────────────────────────────────
    # Create GitHub Release (on tags)
    # ─────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [ build, docker ]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Prepare release assets
      run: |
        mkdir -p release
        for dir in artifacts/binaries-*; do
          cp -r $dir/* release/ 2>/dev/null || true
        done
        cd release
        for f in *; do
          if [ -f "$f" ]; then
            tar -czf "${f}.tar.gz" "$f"
            rm "$f"
          fi
        done

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: release/*
        generate_release_notes: true
        draft: false
        prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
