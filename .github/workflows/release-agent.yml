name: Release Agent Binary

# Triggers on version tags: git tag v1.2.3 && git push --tags
on:
  push:
    tags:
      - "v*"

env:
  GO_VERSION: "1.26.1"
  REPO: KyawKyawThar/intelligent_odoo_dev_toolkit
  # S3/R2 bucket for agent binary distribution.
  # Set these as GitHub repository secrets:
  #   S3_ENDPOINT  — e.g. https://<id>.r2.cloudflarestorage.com  (blank for AWS S3)
  #   S3_BUCKET    — bucket name
  #   S3_REGION    — e.g. auto  (for R2) or us-east-1  (for AWS)
  #   S3_ACCESS_KEY / S3_SECRET_KEY

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Build agent binaries for all target platforms
  # ──────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux — the primary targets (Odoo runs on Linux servers)
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            suffix: linux-armv7
          # macOS — for admins running the agent on dev machines
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git describe in version embed

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build agent binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${{ github.ref_name }}
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          COMMIT=$(git rev-parse --short HEAD)

          go build \
            -ldflags="-s -w \
              -X main.version=${VERSION} \
              -X main.buildTime=${BUILD_TIME} \
              -X main.commit=${COMMIT}" \
            -o dist/odoodevtools-agent-${{ matrix.suffix }} \
            ./cmd/agent

      - name: Generate SHA256 checksum
        run: |
          cd dist
          sha256sum odoodevtools-agent-${{ matrix.suffix }} \
            > odoodevtools-agent-${{ matrix.suffix }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.suffix }}
          path: dist/
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────
  # Create GitHub Release and attach all binaries
  # ──────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate combined checksums file
        run: |
          cd dist
          # Concatenate all individual .sha256 files into one
          cat *.sha256 > checksums.txt
          echo "=== checksums.txt ==="
          cat checksums.txt

      - name: Upload binaries to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.S3_REGION || 'auto' }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          VERSION=${{ github.ref_name }}
          ENDPOINT_FLAG=""
          [ -n "$S3_ENDPOINT" ] && ENDPOINT_FLAG="--endpoint-url $S3_ENDPOINT"

          # Upload each binary + its checksum under agents/<version>/
          for f in dist/odoodevtools-agent-* dist/checksums.txt; do
            filename=$(basename "$f")
            aws s3 cp "$f" "s3://${S3_BUCKET}/agents/${VERSION}/${filename}" \
              $ENDPOINT_FLAG --no-progress
          done

          # Upload the install script
          aws s3 cp scripts/install-agent.sh "s3://${S3_BUCKET}/agents/install.sh" \
            $ENDPOINT_FLAG --no-progress

          # Update the "latest" pointer (plain-text file)
          echo -n "$VERSION" | aws s3 cp - "s3://${S3_BUCKET}/agents/latest" \
            $ENDPOINT_FLAG --content-type "text/plain" --no-progress

          echo "Uploaded agent $VERSION to s3://${S3_BUCKET}/agents/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "OdooDevTools Agent ${{ github.ref_name }}"
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: |
            dist/odoodevtools-agent-*
            dist/checksums.txt
          body: |
            ## OdooDevTools Agent ${{ github.ref_name }}

            Install the agent on your Odoo server with one command:

            ```bash
            curl -sSL https://YOUR_API_DOMAIN/install | \
              AGENT_CLOUD_URL=wss://YOUR_API_DOMAIN/api/v1/agent/ws \
              AGENT_REGISTRATION_TOKEN=reg_YOUR_TOKEN_HERE \
              bash
            ```

            Or copy the command directly from your OdooDevTools dashboard.

            ### Manual Installation

            | Platform | Binary |
            |---|---|
            | Linux amd64 (most servers) | `odoodevtools-agent-linux-amd64` |
            | Linux arm64 | `odoodevtools-agent-linux-arm64` |
            | Linux armv7 (Raspberry Pi) | `odoodevtools-agent-linux-armv7` |
            | macOS amd64 | `odoodevtools-agent-darwin-amd64` |
            | macOS arm64 (Apple Silicon) | `odoodevtools-agent-darwin-arm64` |

            Verify your download:
            ```bash
            sha256sum -c checksums.txt
            ```
