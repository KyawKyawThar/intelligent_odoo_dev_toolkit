basePath: /api/v1
definitions:
  acl.StageResult:
    properties:
      detail: {}
      reason:
        type: string
      stage:
        type: string
      verdict:
        $ref: '#/definitions/acl.Verdict'
    type: object
  acl.Suggestion:
    properties:
      detail:
        description: |-
          Detail provides the concrete Odoo action (e.g. which menu to open,
          which XML ID to add, which field to change).
        type: string
      severity:
        description: |-
          Severity indicates how disruptive the fix is:
            "low"    = safe, targeted change
            "medium" = broader impact, review recommended
            "high"   = affects many users, proceed with caution
        type: string
      stage:
        description: Stage is the pipeline stage that triggered this suggestion.
        type: string
      summary:
        description: Summary is a short, human-readable description of the fix.
        type: string
    type: object
  acl.Verdict:
    enum:
    - OK
    - DENIED
    - SKIPPED
    - ERROR
    type: string
    x-enum-comments:
      VerdictDenied: Stage blocked access — pipeline stops.
      VerdictError: Stage could not be evaluated.
      VerdictOK: Stage passed — continue pipeline.
      VerdictSkipped: Stage not applicable (e.g. no rules).
    x-enum-descriptions:
    - Stage passed — continue pipeline.
    - Stage blocked access — pipeline stops.
    - Stage not applicable (e.g. no rules).
    - Stage could not be evaluated.
    x-enum-varnames:
    - VerdictOK
    - VerdictDenied
    - VerdictSkipped
    - VerdictError
  api.Error:
    properties:
      code:
        $ref: '#/definitions/api.ErrorCode'
      details:
        items:
          $ref: '#/definitions/api.ErrorDetail'
        type: array
      message:
        type: string
      request_id:
        type: string
    type: object
  api.ErrorCode:
    enum:
    - VALIDATION_ERROR
    - UNAUTHORIZED
    - FORBIDDEN
    - NOT_FOUND
    - CONFLICT
    - UNPROCESSABLE_ENTITY
    - RATE_LIMITED
    - BAD_REQUEST
    - PAYLOAD_TOO_LARGE
    - INTERNAL_ERROR
    - SERVICE_UNAVAILABLE
    - TIMEOUT
    - DATABASE_ERROR
    - TENANT_NOT_FOUND
    - ENVIRONMENT_NOT_FOUND
    - AGENT_NOT_CONNECTED
    - AGENT_NOT_FOUND
    - QUOTA_EXCEEDED
    - PLAN_LIMIT_REACHED
    - INVALID_API_KEY
    - EXPIRED_API_KEY
    - INVALID_TOKEN
    - EXPIRED_TOKEN
    - INVALID_CREDENTIALS
    - EMAIL_ALREADY_EXISTS
    - SLUG_ALREADY_EXISTS
    - INVALID_SCOPE
    - SCHEMA_SNAPSHOT_NOT_FOUND
    - MIGRATION_SCAN_NOT_FOUND
    - ERROR_GROUP_NOT_FOUND
    - ALERT_RULE_NOT_FOUND
    - ALERT_CHANNEL_NOT_FOUND
    - PROFILER_RECORDING_NOT_FOUND
    - ANON_PROFILE_NOT_FOUND
    - ANON_JOB_NOT_FOUND
    - INVALID_ODOO_VERSION
    - INVALID_DOMAIN
    type: string
    x-enum-comments:
      ErrCodeExpiredAPIKey: nolint:gosec // not a credential
      ErrCodeInvalidAPIKey: nolint:gosec // not a credential
      ErrCodeInvalidCredentials: nolint:gosec // not a credential
    x-enum-descriptions:
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    - nolint:gosec // not a credential
    - nolint:gosec // not a credential
    - ""
    - ""
    - nolint:gosec // not a credential
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    x-enum-varnames:
    - ErrCodeValidation
    - ErrCodeUnauthorized
    - ErrCodeForbidden
    - ErrCodeNotFound
    - ErrCodeConflict
    - ErrCodeUnprocessable
    - ErrCodeRateLimited
    - ErrCodeBadRequest
    - ErrCodePayloadTooLarge
    - ErrCodeInternal
    - ErrCodeUnavailable
    - ErrCodeTimeout
    - ErrCodeDatabase
    - ErrCodeTenantNotFound
    - ErrCodeEnvironmentNotFound
    - ErrCodeAgentNotConnected
    - ErrCodeAgentNotFound
    - ErrCodeQuotaExceeded
    - ErrCodePlanLimitReached
    - ErrCodeInvalidAPIKey
    - ErrCodeExpiredAPIKey
    - ErrCodeInvalidToken
    - ErrCodeExpiredToken
    - ErrCodeInvalidCredentials
    - ErrCodeEmailAlreadyExists
    - ErrCodeSlugAlreadyExists
    - ErrCodeInvalidScope
    - ErrCodeSchemaSnapshotNotFound
    - ErrCodeMigrationScanNotFound
    - ErrCodeErrorGroupNotFound
    - ErrCodeAlertRuleNotFound
    - ErrCodeAlertChannelNotFound
    - ErrCodeProfilerRecordingNotFound
    - ErrCodeAnonProfileNotFound
    - ErrCodeAnonJobNotFound
    - ErrCodeInvalidOdooVersion
    - ErrCodeInvalidDomain
  api.ErrorDetail:
    properties:
      code:
        type: string
      field:
        type: string
      message:
        type: string
      value: {}
    type: object
  dto.ACLTraceRequest:
    properties:
      group_data:
        description: 'GroupData is all res.groups records from the agent. Each must
          have: id, name, implied_ids.'
        items:
          additionalProperties: {}
          type: object
        type: array
      model:
        description: Model is the Odoo model technical name (e.g. "sale.order").
        type: string
      operation:
        description: 'Operation is the CRUD operation to check: read, write, create,
          unlink.'
        enum:
        - read
        - write
        - create
        - unlink
        type: string
      record_data:
        additionalProperties: {}
        description: |-
          RecordData is the optional field values of the target record (for domain eval).
          Required when record_id > 0. Keys are field names, values are JSON-decoded Odoo values.
        type: object
      record_id:
        description: |-
          RecordID is the optional database ID of a specific record to evaluate
          domain conditions against. If 0, domain evaluation is skipped.
        type: integer
      user_data:
        additionalProperties: {}
        description: |-
          UserData is the raw res.users record as fetched from Odoo by the agent.
          Must contain at least: id, login, name, active, groups_id, company_id.
        type: object
      user_id:
        description: UserID is the Odoo uid to trace (e.g. 2 for admin).
        minimum: 1
        type: integer
    required:
    - group_data
    - model
    - operation
    - user_data
    - user_id
    type: object
  dto.ACLTraceResponse:
    properties:
      stages:
        items:
          $ref: '#/definitions/acl.StageResult'
        type: array
      suggestions:
        description: actionable fix suggestions (only when denied)
        items:
          $ref: '#/definitions/acl.Suggestion'
        type: array
      verdict:
        description: '"ALLOWED" or "DENIED"'
        type: string
    type: object
  dto.APIKeyCreatedResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      env_id:
        type: string
      expires_at:
        type: string
      id:
        type: string
      key_prefix:
        type: string
      name:
        type: string
      raw_key:
        description: shown once; not stored in plaintext
        type: string
      scopes:
        items:
          type: string
        type: array
      tenant_id:
        type: string
    type: object
  dto.APIKeyItem:
    properties:
      created_at:
        type: string
      description:
        type: string
      expires_at:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      key_prefix:
        type: string
      last_used:
        type: string
      name:
        type: string
      scopes:
        items:
          type: string
        type: array
    type: object
  dto.APIKeyListResponse:
    properties:
      keys:
        items:
          $ref: '#/definitions/dto.APIKeyItem'
        type: array
      total:
        type: integer
    type: object
  dto.AcknowledgeAllResponse:
    properties:
      acknowledged:
        type: integer
    type: object
  dto.AgentOverview:
    properties:
      last_heartbeat_at:
        description: LastHeartbeatAt is the time of the most recent heartbeat (nil
          if never seen).
        type: string
      status:
        description: Status is the latest heartbeat status ("healthy", "degraded",
          "offline", "unknown").
        type: string
    type: object
  dto.AlertCountResponse:
    properties:
      count:
        type: integer
    type: object
  dto.AlertListResponse:
    properties:
      alerts:
        items:
          $ref: '#/definitions/dto.AlertResponse'
        type: array
      total:
        type: integer
    type: object
  dto.AlertResponse:
    properties:
      acknowledged:
        type: boolean
      acknowledged_at:
        type: string
      acknowledged_by:
        type: string
      created_at:
        type: string
      env_id:
        type: string
      id:
        type: string
      message:
        type: string
      metadata: {}
      severity:
        type: string
      type:
        type: string
    type: object
  dto.AlertsOverview:
    properties:
      unacknowledged:
        description: Unacknowledged is the number of alerts not yet acknowledged.
        type: integer
    type: object
  dto.BatchORMStat:
    properties:
      avg_ms:
        example: 6.01
        type: number
      call_count:
        example: 148
        type: integer
      max_ms:
        example: 42
        type: integer
      method:
        example: search_read
        type: string
      model:
        example: res.partner
        type: string
      n1_detected:
        example: true
        type: boolean
      p95_ms:
        example: 12
        type: integer
      sample_sql:
        example: SELECT id, name FROM res_partner WHERE active = true
        type: string
      total_ms:
        example: 890
        type: integer
    type: object
  dto.BatchRawEvent:
    properties:
      category:
        example: error
        type: string
      duration_ms:
        example: 0
        type: integer
      is_error:
        example: true
        type: boolean
      is_n1:
        example: false
        type: boolean
      message:
        example: 'ValidationError: No warehouse configured'
        type: string
      method:
        example: action_confirm
        type: string
      model:
        example: sale.order
        type: string
      module:
        example: sale
        type: string
      sql:
        type: string
      timestamp:
        example: "2026-03-19T10:00:15Z"
        type: string
      traceback:
        example: |-
          Traceback (most recent call last):
            File ...
        type: string
      user_id:
        example: 2
        type: integer
    type: object
  dto.BatchSummary:
    properties:
      errors:
        example: 1
        type: integer
      n1_patterns:
        example: 1
        type: integer
      slow_queries:
        example: 3
        type: integer
      total_duration_ms:
        example: 1200
        type: integer
      total_queries:
        example: 200
        type: integer
    type: object
  dto.BudgetDetailResponse:
    properties:
      budget:
        $ref: '#/definitions/dto.BudgetResponse'
      latest_sample:
        $ref: '#/definitions/dto.BudgetSampleResponse'
      trend:
        $ref: '#/definitions/dto.BudgetTrendResponse'
    type: object
  dto.BudgetListResponse:
    properties:
      budgets:
        items:
          $ref: '#/definitions/dto.BudgetResponse'
        type: array
      total:
        type: integer
    type: object
  dto.BudgetResponse:
    properties:
      created_at:
        type: string
      endpoint:
        type: string
      env_id:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      module:
        type: string
      threshold_pct:
        type: integer
    type: object
  dto.BudgetSampleListResponse:
    properties:
      samples:
        items:
          $ref: '#/definitions/dto.BudgetSampleResponse'
        type: array
      total:
        type: integer
    type: object
  dto.BudgetSampleResponse:
    properties:
      breakdown:
        items:
          type: integer
        type: array
      budget_id:
        type: string
      id:
        type: string
      module_ms:
        type: integer
      overhead_pct:
        type: string
      sampled_at:
        type: string
      total_ms:
        type: integer
    type: object
  dto.BudgetTrendResponse:
    properties:
      avg_overhead:
        type: number
      budget_id:
        type: string
      max_overhead:
        type: integer
      sample_count:
        type: integer
    type: object
  dto.BudgetsOverview:
    properties:
      active:
        description: Active is the number of currently active budgets.
        type: integer
      total:
        description: Total is the total number of configured budgets (active + inactive).
        type: integer
    type: object
  dto.ChainRecordingItem:
    properties:
      compute_chain:
        $ref: '#/definitions/dto.ComputeChain'
      endpoint:
        type: string
      env_id:
        type: string
      id:
        type: string
      name:
        type: string
      recorded_at:
        type: string
      total_ms:
        type: integer
      triggered_by:
        type: string
    type: object
  dto.ChainRecordingListResponse:
    properties:
      recordings:
        items:
          $ref: '#/definitions/dto.ChainRecordingItem'
        type: array
      total:
        type: integer
    type: object
  dto.ChainResponse:
    properties:
      compute_chain:
        $ref: '#/definitions/dto.ComputeChain'
      name:
        type: string
      recorded_at:
        type: string
      recording_id:
        type: string
    type: object
  dto.ChangePasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        minLength: 8
        type: string
    required:
    - current_password
    - new_password
    type: object
  dto.ComputeChain:
    properties:
      edges:
        description: Edges are the dependency links between nodes.
        items:
          $ref: '#/definitions/dto.ComputeEdge'
        type: array
      nodes:
        description: Nodes are the individual computed field evaluations.
        items:
          $ref: '#/definitions/dto.ComputeNode'
        type: array
      summary:
        allOf:
        - $ref: '#/definitions/dto.ComputeChainSummary'
        description: Summary provides aggregate statistics.
    type: object
  dto.ComputeChainSummary:
    properties:
      bottleneck_count:
        description: BottleneckCount is the number of nodes flagged as bottlenecks.
        type: integer
      max_depth:
        description: MaxDepth is the deepest dependency chain depth.
        type: integer
      node_count:
        description: NodeCount is the number of computed field evaluations.
        type: integer
      slowest_ms:
        description: SlowestMS is the duration of the slowest compute node.
        type: integer
      slowest_node:
        description: SlowestNode is the ID of the slowest compute node.
        type: string
      total_ms:
        description: TotalMS is the total time spent in compute field evaluations.
        type: integer
      trigger_field:
        description: TriggerField is the root field write that started the chain.
        type: string
    type: object
  dto.ComputeEdge:
    properties:
      from:
        description: From is the source node ID (the field that was written/changed).
        type: string
      to:
        description: To is the target node ID (the computed field that was triggered).
        type: string
      trigger_field:
        description: TriggerField is the specific field that triggered the recomputation.
        type: string
    type: object
  dto.ComputeNode:
    properties:
      depends_on:
        description: DependsOn lists the field names this computation depends on.
        items:
          type: string
        type: array
      depth:
        description: Depth is the nesting level in the dependency chain (0 = root
          trigger).
        type: integer
      duration_ms:
        description: DurationMS is how long this computation took.
        type: integer
      field_name:
        description: FieldName is the computed field (e.g. "amount_total").
        type: string
      id:
        description: ID is a unique identifier for this node within the chain.
        type: string
      is_bottleneck:
        description: IsBottleneck flags nodes that are disproportionately slow.
        type: boolean
      method:
        description: Method is the compute method (e.g. "_compute_amount_total").
        type: string
      model:
        description: Model is the Odoo model (e.g. "sale.order").
        type: string
      module:
        description: Module is the Odoo module that defines this compute (e.g. "sale").
        type: string
      parent_id:
        description: ParentID links to the node that triggered this computation.
        type: string
      sql_count:
        description: SQLCount is the number of SQL queries executed during this computation.
        type: integer
    type: object
  dto.CreateAPIKeyRequest:
    properties:
      description:
        maxLength: 255
        type: string
      expires_at:
        description: RFC3339; defaults to 90 days from now if omitted
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
      scopes:
        items:
          type: string
        type: array
    required:
    - name
    type: object
  dto.CreateBudgetRequest:
    properties:
      endpoint:
        maxLength: 256
        minLength: 1
        type: string
      module:
        maxLength: 128
        minLength: 1
        type: string
      threshold_pct:
        maximum: 100
        minimum: 1
        type: integer
    required:
    - endpoint
    - module
    - threshold_pct
    type: object
  dto.CreateEnvironmentRequest:
    properties:
      db_name:
        maxLength: 63
        minLength: 1
        type: string
      env_type:
        enum:
        - development
        - staging
        - production
        type: string
      feature_flags:
        description: |-
          FeatureFlags holds arbitrary JSON configuration
          @Description Feature flags as JSON objec
          @example {"enable_profiling": true, "log_level": "info"}
        type: object
      name:
        maxLength: 100
        minLength: 1
        type: string
      odoo_url:
        type: string
      odoo_version:
        enum:
        - "14.0"
        - "15.0"
        - "16.0"
        - "17.0"
        - "18.0"
        type: string
    required:
    - db_name
    - env_type
    - name
    - odoo_url
    type: object
  dto.EnvironmentListResponse:
    properties:
      environments:
        items:
          $ref: '#/definitions/dto.EnvironmentResponse'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  dto.EnvironmentResponse:
    properties:
      agent_id:
        type: string
      created_at:
        type: string
      db_name:
        type: string
      env_type:
        type: string
      feature_flags:
        type: object
      id:
        type: string
      last_sync:
        type: string
      name:
        type: string
      odoo_url:
        type: string
      odoo_version:
        type: string
      status:
        type: string
      tenant_id:
        type: string
      updated_at:
        type: string
    type: object
  dto.ErrorEventContext:
    properties:
      request_url:
        type: string
      uid:
        type: integer
    type: object
  dto.ErrorEventPayload:
    properties:
      context:
        $ref: '#/definitions/dto.ErrorEventContext'
      message:
        type: string
      model:
        type: string
      module:
        type: string
      signature:
        type: string
      timestamp:
        type: string
      traceback:
        type: string
      type:
        type: string
    required:
    - message
    - signature
    - timestamp
    - type
    type: object
  dto.ErrorGroupDetailResponse:
    properties:
      affected_users:
        items:
          type: integer
        type: array
      created_at:
        type: string
      env_id:
        type: string
      error_type:
        type: string
      first_seen:
        type: string
      id:
        type: string
      last_seen:
        type: string
      message:
        type: string
      model:
        type: string
      module:
        type: string
      occurrence_count:
        type: integer
      raw_trace:
        type: string
      raw_trace_ref:
        type: string
      resolved_at:
        type: string
      resolved_by:
        type: string
      signature:
        type: string
      status:
        type: string
    type: object
  dto.ErrorGroupListResponse:
    properties:
      errors:
        items:
          $ref: '#/definitions/dto.ErrorGroupResponse'
