        type: integer
      refresh_token:
        type: string
      token_type:
        type: string
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.LogoutRequest:
    properties:
      logout_all:
        description: true = revoke all sessions
        type: boolean
      session_id:
        description: specific session; empty = current token only
        type: string
    type: object
  dto.Meta:
    properties:
      has_next:
        type: boolean
      has_prev:
        type: boolean
      page:
        type: integer
      per_page:
        type: integer
      took:
        type: string
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  dto.N1DetectionResponse:
    properties:
      patterns:
        items:
          $ref: '#/definitions/dto.N1Pattern'
        type: array
      summary:
        $ref: '#/definitions/dto.N1Summary'
    type: object
  dto.N1Overview:
    properties:
      critical_count:
        description: CriticalCount is the number of patterns classified as critical
          severity.
        type: integer
      patterns_detected:
        description: PatternsDetected is the number of distinct N+1 patterns found
          in the last 24h.
        type: integer
    type: object
  dto.N1Pattern:
    properties:
      avg_calls_per_window:
        description: AvgCallsPerWindow is the average call count per detection window.
        type: number
      first_seen:
        description: FirstSeen is the earliest detection window.
        type: string
      impact_score:
        description: |-
          ImpactScore ranks the pattern: higher = more damaging. Computed as
          total_ms × occurrences / 1000 (normalized to seconds of wasted time).
        type: number
      last_seen:
        description: LastSeen is the most recent detection window.
        type: string
      method:
        description: Method is the ORM method (e.g. "search_read").
        type: string
      model:
        description: Model is the Odoo model (e.g. "res.partner").
        type: string
      occurrences:
        description: Occurrences is how many time windows this pattern was detected
          in.
        type: integer
      peak_calls:
        description: PeakCalls is the highest call count seen in a single window.
        type: integer
      peak_ms:
        description: PeakMS is the highest duration seen in a single window.
        type: integer
      sample_sql:
        description: SampleSQL is a concrete SQL example from the pattern.
        type: string
      severity:
        description: 'Severity categorizes the impact: "critical", "high", "medium",
          "low".'
        type: string
      signature:
        description: Signature is the normalized SQL signature (literals replaced
          with ?).
        type: string
      suggestion:
        description: Suggestion is an actionable fix recommendation.
        type: string
      total_calls:
        description: TotalCalls is the cumulative call count across all detected windows.
        type: integer
      total_ms:
        description: TotalMS is the cumulative duration in milliseconds.
        type: integer
    type: object
  dto.N1Summary:
    properties:
      critical_count:
        description: CriticalCount is patterns with severity "critical".
        type: integer
      high_count:
        description: HighCount is patterns with severity "high".
        type: integer
      top_method:
        description: TopMethod is the method with the most N+1 impact.
        type: string
      top_model:
        description: TopModel is the model with the most N+1 impact.
        type: string
      total_patterns:
        description: TotalPatterns is the number of distinct model:method patterns.
        type: integer
      total_wasted_ms:
        description: TotalWastedMS is the cumulative time spent in N+1 queries.
        type: integer
    type: object
  dto.N1TimelinePoint:
    properties:
      pattern_count:
        type: integer
      period:
        type: string
      total_calls:
        type: integer
      total_ms:
        type: integer
    type: object
  dto.N1TimelineResponse:
    properties:
      points:
        items:
          $ref: '#/definitions/dto.N1TimelinePoint'
        type: array
    type: object
  dto.OverviewResponse:
    properties:
      agent:
        $ref: '#/definitions/dto.AgentOverview'
      alerts:
        $ref: '#/definitions/dto.AlertsOverview'
      budgets:
        $ref: '#/definitions/dto.BudgetsOverview'
      errors:
        $ref: '#/definitions/dto.ErrorsOverview'
      n1:
        $ref: '#/definitions/dto.N1Overview'
      profiler:
        $ref: '#/definitions/dto.ProfilerOverview'
    type: object
  dto.ProfilerOverview:
    properties:
      total_recordings:
        description: TotalRecordings is the total number of profiler recordings.
        type: integer
      with_compute_chain:
        description: WithComputeChain is the count of recordings that contain compute-chain
          data.
        type: integer
    type: object
  dto.ProfilerRecordingListItem:
    properties:
      endpoint:
        type: string
      env_id:
        type: string
      has_compute_chain:
        type: boolean
      has_n1:
        type: boolean
      id:
        type: string
      name:
        type: string
      python_ms:
        type: integer
      recorded_at:
        type: string
      sql_count:
        type: integer
      sql_ms:
        type: integer
      total_ms:
        type: integer
      triggered_by:
        type: string
    type: object
  dto.ProfilerRecordingListResponse:
    properties:
      recordings:
        items:
          $ref: '#/definitions/dto.ProfilerRecordingListItem'
        type: array
      total:
        type: integer
    type: object
  dto.ProfilerRecordingResponse:
    properties:
      compute_chain:
        $ref: '#/definitions/dto.ComputeChain'
      endpoint:
        type: string
      env_id:
        type: string
      id:
        type: string
      name:
        type: string
      python_ms:
        type: integer
      recorded_at:
        type: string
      sql_count:
        type: integer
      sql_ms:
        type: integer
      total_ms:
        type: integer
      triggered_by:
        type: string
      waterfall:
        $ref: '#/definitions/dto.Waterfall'
    type: object
  dto.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  dto.RefreshTokenResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      token_type:
        type: string
    type: object
  dto.RegisterAgentResponse:
    properties:
      expires_at:
        type: string
      registration_token:
        type: string
    type: object
  dto.RegisterRequest:
    properties:
      confirm_password:
        minLength: 8
        type: string
      email:
        type: string
      full_name:
        maxLength: 100
        type: string
      password:
        minLength: 8
        type: string
      tenant_name:
        maxLength: 100
        minLength: 2
        type: string
      tenant_slug:
        maxLength: 50
        minLength: 2
        type: string
    required:
    - confirm_password
    - email
    - password
    - tenant_name
    - tenant_slug
    type: object
  dto.ResetPasswordRequest:
    properties:
      confirm_new_password:
        minLength: 8
        type: string
      new_password:
        minLength: 8
        type: string
      token:
        type: string
    required:
    - confirm_new_password
    - new_password
    - token
    type: object
  dto.SchemaAccessRule:
    properties:
      group_id:
        type: string
      perm_create:
        type: boolean
      perm_read:
        type: boolean
      perm_unlink:
        type: boolean
      perm_write:
        type: boolean
    type: object
  dto.SchemaModel:
    properties:
      accesses:
        items:
          $ref: '#/definitions/dto.SchemaAccessRule'
        type: array
      fields:
        additionalProperties:
          $ref: '#/definitions/dto.SchemaModelField'
        type: object
      model:
        type: string
      name:
        type: string
      rules:
        items:
          $ref: '#/definitions/dto.SchemaRecordRule'
        type: array
    type: object
  dto.SchemaModelField:
    properties:
      default: {}
      required:
        type: boolean
      string:
        type: string
      type:
        type: string
    type: object
  dto.SchemaRecordRule:
    properties:
      domain:
        type: string
      name:
        type: string
      perm_create:
        type: boolean
      perm_read:
        type: boolean
      perm_unlink:
        type: boolean
      perm_write:
        type: boolean
    type: object
  dto.SchemaSnapshotListItem:
    properties:
      captured_at:
        type: string
      diff_ref:
        type: string
      env_id:
        type: string
      field_count:
        type: integer
      id:
        type: string
      model_count:
        type: integer
      version:
        type: string
    type: object
  dto.SchemaSnapshotListResponse:
    properties:
      limit:
        type: integer
      snapshots:
        items:
          $ref: '#/definitions/dto.SchemaSnapshotListItem'
        type: array
      total:
        type: integer
    type: object
  dto.SchemaSnapshotResponse:
    properties:
      captured_at:
        type: string
      diff_ref:
        type: string
      env_id:
        type: string
      field_count:
        type: integer
      id:
        type: string
      model_count:
        type: integer
      models:
        type: object
      version:
        type: string
    type: object
  dto.SearchModelsResponse:
    properties:
      limit:
        type: integer
      models:
        items:
          type: object
        type: array
      offset:
        type: integer
      total:
        type: integer
    type: object
  dto.SessionResponse:
    properties:
      created_at:
        type: string
      expires_at:
        type: string
      id:
        type: string
      ip_address:
        type: string
      last_active_at:
        type: string
      user_agent:
        type: string
    type: object
  dto.StoreSchemaRequest:
    properties:
      env_id:
        type: string
      field_count:
        type: integer
      model_count:
        type: integer
      models:
        additionalProperties:
          $ref: '#/definitions/dto.SchemaModel'
        type: object
      version:
        type: string
    required:
    - models
    - version
    type: object
  dto.UpdateBudgetRequest:
    properties:
      is_active:
        type: boolean
      threshold_pct:
        maximum: 100
        minimum: 1
        type: integer
    required:
    - is_active
    - threshold_pct
    type: object
  dto.UpdateEnvironmentRequest:
    properties:
      db_name:
        maxLength: 63
        minLength: 1
        type: string
      env_type:
        enum:
        - development
        - staging
        - production
        type: string
      feature_flags:
        description: '@example {"enable_profiling": true, "log_level": "info"}'
        type: object
      name:
        maxLength: 100
        minLength: 1
        type: string
      odoo_url:
        type: string
      odoo_version:
        enum:
        - "14.0"
        - "15.0"
        - "16.0"
        - "17.0"
        - "18.0"
        type: string
      status:
        enum:
        - active
        - inactive
        - maintenance
        type: string
    type: object
  dto.UpdateFlagsRequest:
    properties:
      flags:
        description: |-
          Flags holds the complete feature-flag object to store.
          @Description Feature flags as JSON object
          @example {"sampling_mode":"sampled","sample_rate":0.25}
        type: object
    required:
    - flags
    type: object
  dto.UpdateFlagsResponse:
    properties:
      agent_connected:
        type: boolean
      feature_flags:
        type: object
      id:
        type: string
      pushed:
        type: boolean
    type: object
  dto.UpdateUserRequest:
    properties:
      email:
        type: string
      full_name:
        maxLength: 100
        type: string
    type: object
  dto.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      email_verified:
        type: boolean
      full_name:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      last_login_at:
        type: string
      tenant_id:
        type: string
      updated_at:
        type: string
    type: object
  dto.VerifyEmailRequest:
    properties:
      code:
        type: string
      email:
        type: string
    required:
    - code
    - email
    type: object
  dto.Waterfall:
    properties:
      lanes:
        items:
          $ref: '#/definitions/dto.WaterfallLane'
        type: array
      spans:
        items:
          $ref: '#/definitions/dto.WaterfallSpan'
        type: array
      summary:
        $ref: '#/definitions/dto.WaterfallSummary'
    type: object
  dto.WaterfallLane:
    properties:
      category:
        type: string
      label:
        type: string
      pct:
        type: number
      total_ms:
        type: integer
    type: object
  dto.WaterfallSpan:
    properties:
      category:
        description: 'Category classifies the span: "sql", "orm", "python", "rpc",
          "http".'
        type: string
      depth:
        description: Depth is the nesting level (0 = top-level).
        type: integer
      duration_ms:
        description: DurationMS is the span duration in milliseconds.
        type: integer
      id:
        description: ID is a unique identifier for this span within the waterfall.
        type: string
      is_error:
        description: IsError flags spans that resulted in an error.
        type: boolean
      is_n1:
        description: IsN1 flags spans that are part of an N+1 pattern.
        type: boolean
      label:
        description: Label is a human-readable description (e.g. "res.partner.search_read").
        type: string
      method:
        description: Method is the ORM method name (optional).
        type: string
      model:
        description: Model is the Odoo model involved (optional).
        type: string
      module:
        description: Module is the Odoo module that originated this span (optional).
        type: string
      parent_id:
        description: ParentID links child spans to their parent (e.g. ORM → SQL).
        type: string
      sql:
        description: SQL is the query text for SQL spans (optional, truncated).
        type: string
      start_ms:
        description: StartMS is the offset from the recording start in milliseconds.
        type: integer
    type: object
  dto.WaterfallSummary:
    properties:
      critical_sql:
        type: string
      error_count:
        type: integer
      n1_count:
        type: integer
      n1_ms:
        type: integer
      orm_count:
        type: integer
      orm_ms:
        type: integer
      python_ms:
        type: integer
      span_count:
        type: integer
      sql_count:
        type: integer
      sql_ms:
        type: integer
      total_ms:
        type: integer
    type: object
host: localhost:8080
info:
  contact:
    name: API Support
    url: http://example.com/support
  description: A comprehensive development toolkit for Odoo environments with profiling,
    monitoring, and optimization features.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: OdooDevTools API
  version: 1.0.0
paths:
  /agent/batch:
    post:
      consumes:
      - application/json
      description: |-
        Agent endpoint: receive an aggregated batch of ORM stats and critical events.
        The batch is pushed onto a Redis stream for asynchronous processing by the ingest worker.
        Supports gzip-compressed bodies (Content-Encoding: gzip). Max body size: 5 MB.
      parameters:
      - description: Aggregated batch payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.IngestBatchRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/dto.IngestBatchResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.Error'
      security:
      - ApiKeyAuth: []
      summary: Ingest aggregated batch
      tags:
      - agent
  /agent/errors:
    post:
      consumes:
      - application/json
      description: 'Agent endpoint: receive a batch of Odoo error/exception events'
      parameters:
      - description: Error batch
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.IngestErrorsRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.Error'
      security:
      - ApiKeyAuth: []
      summary: Ingest error events
      tags:
      - agent
  /agent/schema:
    post:
      consumes:
      - application/json
      description: 'Agent endpoint: persist a collected Odoo schema snapshot'
      parameters:
      - description: Schema payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.StoreSchemaRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.SchemaSnapshotResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.Error'
      security:
      - ApiKeyAuth: []
      summary: Store schema snapshot
      tags:
      - agent
  /agent/ws:
    get:
      consumes:
      - application/json
      description: Upgrades the HTTP connection to a WebSocket connection and handles
        agent heartbeats.
      parameters:
      - description: Agent ID
        in: query
        name: agent_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "101":
          description: Switching Protocols
          schema:
            type: string
        "400":
          description: 'Bad Request: Missing or invalid agent_id'
          schema:
            $ref: '#/definitions/api.Error'
        "401":
          description: 'Unauthorized: Invalid or missing API key'
          schema:
            $ref: '#/definitions/api.Error'
        "403":
          description: 'Forbidden: Agent does not belong to the tenant'
          schema:
            $ref: '#/definitions/api.Error'
        "404":
          description: 'Not Found: Environment not found for the given agent_id'
          schema:
            $ref: '#/definitions/api.Error'
        "500":
          description: 'Internal Server Error: Failed to upgrade connection or database
            error'
          schema:
            $ref: '#/definitions/api.Error'
      security:
      - ApiKeyAuth: []
      summary: WebSocket endpoint for agent communication
      tags:
      - Agents
  /auth/change-password:
    post:
      consumes:
      - application/json
      description: Lets a logged-in user change their own password. Requires the current
        password for verification. All sessions are revoked on success.
      parameters:
      - description: Current and new password
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.Error'
      security:
      - BearerAuth: []
      summary: Change password
      tags:
      - Auth
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Always returns HTTP 200 regardless of whether the email is registered
        (prevents user enumeration). Sends a reset link via MailHog when the account
        exists.
      parameters:
      - description: Email address
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.Error'
      summary: Forgot password
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user by email and password. Enforces brute-force
        protection via Redis. Returns an access and refresh token pair.
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.Error'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/api.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.Error'
      security:
      - none: []
      summary: Login
      tags:
      - Auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Invalidates the current session or all sessions when logout_all=true.
        Requires a valid Bearer token.
      parameters:
      - description: Logout options (optional)
        in: body
        name: request
        schema:
          $ref: '#/definitions/dto.LogoutRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.Error'
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - Auth
  /auth/me:
    get:
      description: Returns the profile of the authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.Error'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - Auth
    patch:
      consumes:
      - application/json
      description: Updates full_name and/or email for the authenticated user. If the
        email is changed a new verification email is sent via MailHog.
      parameters:
      - description: Fields to update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.Error'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/api.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.Error'
      security:
      - BearerAuth: []
      summary: Update current user
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Rotates the refresh token (old one is blacklisted in Redis) and
        issues a new access + refresh pair.
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RefreshTokenResponse'
