      last_seen:
        type: string
      message:
        type: string
      model:
        type: string
      module:
        type: string
      occurrence_count:
        type: integer
      raw_trace_ref:
        type: string
      resolved_at:
        type: string
      resolved_by:
        type: string
      signature:
        type: string
      status:
        type: string
    type: object
  dto.ErrorsOverview:
    properties:
      open:
        description: Open is the count of error groups still in "open" status.
        type: integer
      total:
        description: Total is the total number of error groups for this environment.
