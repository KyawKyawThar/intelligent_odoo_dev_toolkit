        example: 148
        type: integer
      max_ms:
        example: 42
        type: integer
      method:
        example: search_read
        type: string
      model:
        example: res.partner
        type: string
      n1_detected:
        example: true
        type: boolean
      p95_ms:
        example: 12
        type: integer
      sample_sql:
        example: SELECT id, name FROM res_partner WHERE active = true
        type: string
      total_ms:
        example: 890
        type: integer
    type: object
  dto.BatchRawEvent:
    properties:
      category:
        example: error
        type: string
      duration_ms:
        example: 0
        type: integer
      is_error:
        example: true
        type: boolean
      is_n1:
        example: false
        type: boolean
      message:
        example: 'ValidationError: No warehouse configured'
        type: string
      method:
        example: action_confirm
        type: string
      model:
        example: sale.order
        type: string
      module:
        example: sale
        type: string
      sql:
        type: string
      timestamp:
        example: "2026-03-19T10:00:15Z"
        type: string
      traceback:
        example: |-
          Traceback (most recent call last):
            File ...
        type: string
      user_id:
        example: 2
        type: integer
    type: object
  dto.BatchSummary:
    properties:
      errors:
        example: 1
        type: integer
      n1_patterns:
        example: 1
        type: integer
      slow_queries:
        example: 3
        type: integer
      total_duration_ms:
        example: 1200
        type: integer
      total_queries:
        example: 200
        type: integer
    type: object
  dto.ChangePasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        minLength: 8
        type: string
