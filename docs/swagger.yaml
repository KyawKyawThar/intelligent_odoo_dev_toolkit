securityDefinitions:
  ApiKeyAuth:
    description: Type "ApiKey" followed by a space and your API key (e.g. "ApiKey
      odt_xxx...").
    in: header
    name: Authorization
    type: apiKey
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
